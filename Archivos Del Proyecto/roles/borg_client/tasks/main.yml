---
- name: Instalar BorgBackup en cliente
  apt:
    name: borgbackup
    state: present
    update_cache: yes

- name: Generar par de claves SSH para el cliente
  openssh_keypair:
    path: /home/{{ borg_client_user }}/.ssh/id_borg
    owner: "{{ borg_client_user }}"
    type: rsa
    size: 4096
  register: ssh_key

- name: Leer clave pública generada
  slurp:
    src: /home/{{ borg_client_user }}/.ssh/id_borg.pub
  register: pub_key

- name: Añadir clave pública al servidor (authorized_keys con restricción borg)
  delegate_to: borg-server
  lineinfile:
    path: /home/{{ borg_backup_user }}/.ssh/authorized_keys
    line: 'command="borg serve --restrict-to-path {{ borg_repo_path }}",no-port-forwarding,no-X11-forwarding,no-agent-forwarding,no-pty {{ pub_key.content | b64decode | trim }}'
    create: yes
    owner: "{{ borg_backup_user }}"
    mode: '0600'

- name: Añadir servidor a known_hosts del cliente
  known_hosts:
    name: "{{ borg_server_ip }}"
    key: "{{ lookup('pipe', 'ssh-keyscan -t rsa ' + borg_server_ip) }}"
    path: /home/{{ borg_client_user }}/.ssh/known_hosts

- name: Inicializar repositorio Borg
  become_user: "{{ borg_client_user }}"
  command: >
    borg init --encryption=repokey
    ssh://{{ borg_backup_user }}@{{ borg_server_ip }}{{ borg_repo_path }}
  environment:
    BORG_PASSPHRASE: "{{ borg_passphrase }}"
    BORG_RSH: "ssh -i /home/{{ borg_client_user }}/.ssh/id_borg"
  ignore_errors: yes

- name: Crear script de backup
  template:
    src: backup.sh.j2
    dest: /usr/local/bin/borg-backup.sh
    mode: '0755'
