[borg_server]
borg-server ansible_host=192.168.1.213 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/vagrant_keys/borg-server.key ansible_ssh_extra_args='-o StrictHostKeyChecking=no'

[borg_client]
borg-client ansible_host=192.168.1.214 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/vagrant_keys/borg-client.key ansible_ssh_extra_args='-o StrictHostKeyChecking=no'
